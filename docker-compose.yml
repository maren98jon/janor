services:
  postgres:
    image: postgres:16-alpine
    container_name: janor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: janor
      POSTGRES_PASSWORD: janor_secret
      POSTGRES_DB: janor_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
